<!DOCTYPE html>
<html>
<head>
    <title>Kubernetes Voting App</title>
</head>
<body>

<h1>Frontend Pod</h1>

<button onclick="vote('Option A')">Vote A</button>
<button onclick="vote('Option B')">Vote B</button>

<button onclick="results()">Arata rezultatul</button>

<p id="output"></p>

<script>

function vote(option) {
    fetch("http://34.77.149.99:5000/api/vote", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ option: option })
    })
    .then(r => r.json())
    .then(d => {
        document.getElementById("output").innerText = d.message;
    })
    .catch(e => {
        document.getElementById("output").innerText = "Eroare: " + e;
    });
}

function results() {
    fetch("http://34.77.149.99:5000/api/results")
    .then(r => r.json())
    .then(d => {
        document.getElementById("output").innerText = JSON.stringify(d);
    })
    .catch(e => {
        document.getElementById("output").innerText = "Eroare: " + e;
    });
}

</script>

</body>
</html>
