apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: europe-west1-docker.pkg.dev/laborator4-ci-cd-do/lab4-docker-repo/voting-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80