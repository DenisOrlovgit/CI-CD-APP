apiVersion: apps/v1
kind: Deployment

metadata:
  name: db-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: db

  template:
    metadata:
      labels:
        app: db

    spec:
      containers:

      - name: postgres

        image: postgres:15

        env:

        - name: POSTGRES_DB
          value: votesdb

        - name: POSTGRES_USER
          value: user

        - name: POSTGRES_PASSWORD
          value: password

        ports:
        - containerPort: 5432