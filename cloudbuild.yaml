steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'europe-west1-docker.pkg.dev/laborator4-ci-cd-do/lab4-docker-repo/voting-backend:latest', './backend']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'europe-west1-docker.pkg.dev/laborator4-ci-cd-do/lab4-docker-repo/voting-frontend:latest', './frontend']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'europe-west1-docker.pkg.dev/laborator4-ci-cd-do/lab4-docker-repo/voting-backend:latest']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'europe-west1-docker.pkg.dev/laborator4-ci-cd-do/lab4-docker-repo/voting-frontend:latest']

- name: 'gcr.io/cloud-builders/gcloud'
  args: ['container', 'clusters', 'get-credentials', 'lab4-gke-cluster', '--region', 'europe-west1', '--project', 'laborator4-ci-cd-do']

- name: 'gcr.io/cloud-builders/kubectl'
  args: ['apply', '-f', 'k8s/']
  env:
  - 'CLOUDSDK_COMPUTE_REGION=europe-west1'
  - 'CLOUDSDK_CONTAINER_CLUSTER=lab4-gke-cluster'

images:
- 'europe-west1-docker.pkg.dev/laborator4-ci-cd-do/lab4-docker-repo/voting-backend:latest'
- 'europe-west1-docker.pkg.dev/laborator4-ci-cd-do/lab4-docker-repo/voting-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY