steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/lab-docker-repo/voting-backend:latest'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/lab-docker-repo/voting-frontend:latest'
      - './frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/lab-docker-repo/voting-backend:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/lab-docker-repo/voting-frontend:latest'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'container'
      - 'clusters'
      - 'get-credentials'
      - 'lab-gke-cluster'
      - '--region'
      - 'europe-west1'
      - '--project'
      - '$PROJECT_ID'

  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'apply'
      - '-f'
      - 'k8s/'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=europe-west1'
      - 'CLOUDSDK_CONTAINER_CLUSTER=lab-gke-cluster'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/lab-docker-repo/voting-backend:latest'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/lab-docker-repo/voting-frontend:latest'